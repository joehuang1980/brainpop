<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrainPOP 學習抽卡機</title>
    <style>
        /* 基礎平板友善排版 */
        body {
            font-family: 'Comic Sans MS', 'Microsoft JhengHei', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; }
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #34495e;
            display: block;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: 2px solid #bdc3c7;
            background-color: #fafafa;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            box-shadow: 0 5px 0 #c0392b;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: none;
        }

        /* 盲盒抽卡區塊 */
        #gacha-section { display: none; }
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        /* 3D 翻牌動畫設定 */
        .card {
            width: 120px;
            height: 160px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        /* 卡片背面 (問號方塊) */
        .card-back {
            background-color: #f1c40f;
            color: white;
            border: 4px solid #e67e22;
        }
        .card-back::after { content: "?"; font-weight: bold; }
        /* 卡片正面 (角色顯示) */
        .card-front {
            background-color: #ecf0f1;
            transform: rotateY(180deg);
            flex-direction: column;
            border: 4px solid #3498db;
        }
        .char-image {
            width: 80px;
            height: 80px;
            background-color: #ddd;
            border-radius: 50%;
            margin-bottom: 10px;
            background-size: cover;
            background-position: center;
        }
        .char-name { font-size: 0.9rem; font-weight: bold; color: #333; }
        .char-points { font-size: 0.8rem; color: #e74c3c; }

        #result-msg {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #27ae60;
            display: none;
        }
        #loading { display: none; color: #2980b9; font-weight: bold; margin-top: 15px;}
    </style>
</head>
<body>

    <div class="container" id="form-section">
        <h1>🌟 BrainPOP 學習紀錄</h1>
        
        <div class="form-group">
            <label>觀看者是誰？</label>
            <select id="viewer">
                <option value="" disabled selected>請選擇...</option>
                <option value="Olivia">Olivia</option>
                <option value="Lucas">Lucas</option>
            </select>
        </div>

        <div class="form-group">
            <label>Level</label>
            <select id="level" onchange="updateUnits()">
                <option value="" disabled selected>請選擇 Level...</option>
                <option value="Level 1">Level 1</option>
                <option value="Level 2">Level 2</option>
                <option value="Level 3">Level 3</option>
            </select>
        </div>

        <div class="form-group">
            <label>Unit</label>
            <select id="unit" onchange="updateLessons()" disabled>
                <option value="" disabled selected>先選擇 Level</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lesson</label>
            <select id="lesson" disabled>
                <option value="" disabled selected>先選擇 Unit</option>
            </select>
        </div>

        <button onclick="startGacha()">完成觀看，進入抽獎！</button>
        <div id="loading">資料傳送中，請稍候...</div>
    </div>

    <div class="container" id="gacha-section">
        <h1>🎁 憑直覺抽一張卡！</h1>
        <div class="cards-container">
            <div class="card" onclick="flipCard(this)">
                <div class="card-inner">
                    <div class="card-front"></div>
                    <div class="card-back"></div>
                </div>
            </div>
            <div class="card" onclick="flipCard(this)">
                <div class="card-inner">
                    <div class="card-front"></div>
                    <div class="card-back"></div>
                </div>
            </div>
            <div class="card" onclick="flipCard(this)">
                <div class="card-inner">
                    <div class="card-front"></div>
                    <div class="card-back"></div>
                </div>
            </div>
        </div>
        <div id="result-msg"></div>
        <button style="margin-top: 20px; display: none;" id="reset-btn" onclick="location.reload()">再看一部！</button>
    </div>

    <script>
        // 替換成你的 Google Apps Script 網頁應用程式網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyPgfHE2G0XaWuL9xG3lF9VrQxaOHc5ty78miImKBd-IxwfXLh80-FJRY6p65xJa2J5SQ/exec";

        // BrainPOP ELL 課程資料結構 (參考提供之清單)
        const courseData = {
            "Level 1": {
                "Unit 1": ["1. The Friends", "2. Magic Show", "3. What Is It?", "4. Five Dogs", "5. Practice!", "Review"],
                "Unit 2": ["1. Cleaning", "2. At the Museum", "3. Be Quiet!", "4. The Poppers", "5. Help Me!", "Review"],
                "Unit 3": ["1. The Picnic", "2. At the Game", "3. In the Park", "4. Let's Eat", "5. A Bike Ride", "Review"],
                "Unit 4": ["1. About Mike", "2. Our Band", "3. A New Dog", "4. Best Friends", "5. Moby's Doctor", "Review"],
                "Unit 5": ["1. Family Pictures", "2. A Gift for Ed", "3. I Remember!", "4. The Accident", "5. Nikki's Birthday", "Review"],
                "Unit 6": ["1. The Thief", "2. Strange Dream", "3. A Bad Week", "4. Camping Trip", "5. Find the Keys", "Review"]
            },
            // 在此結構下可依照 PDF 內容繼續擴充 Level 2 與 Level 3
            "Level 2": {
                "Unit 1": ["1. Ben's Hobby", "2. A New Library", "3. Scary Stories", "4. Mammals", "5. The Dog Show", "Review"]
            },
            "Level 3": {
                "Unit 1": ["1. Endangered Species", "2. Inventions", "3. Life in the Future", "4. On the Farm", "5. Music Genres", "Review"]
            }
        };

        // 瑪利歐卡池與機率設定
        const gachaPool = [
            { rarity: 'N', prob: 0.50, points: 1, chars: [
                { name: '慢慢龜', img: 'https://via.placeholder.com/80/2ecc71/ffffff?text=Koopa' },
                { name: '栗寶寶', img: 'https://via.placeholder.com/80/8e44ad/ffffff?text=Goomba' },
                { name: '嘿呵', img: 'https://via.placeholder.com/80/e74c3c/ffffff?text=ShyGuy' }
            ]},
            { rarity: 'R', prob: 0.30, points: 3, chars: [
                { name: '奇諾比奧', img: 'https://via.placeholder.com/80/3498db/ffffff?text=Toad' },
                { name: '耀西', img: 'https://via.placeholder.com/80/27ae60/ffffff?text=Yoshi' }
            ]},
            { rarity: 'SR', prob: 0.15, points: 5, chars: [
                { name: '瑪利歐', img: 'https://via.placeholder.com/80/c0392b/ffffff?text=Mario' },
                { name: '路易吉', img: 'https://via.placeholder.com/80/2ecc71/ffffff?text=Luigi' },
                { name: '碧姬公主', img: 'https://via.placeholder.com/80/ff9ff3/ffffff?text=Peach' },
                { name: '庫巴', img: 'https://via.placeholder.com/80/f1c40f/ffffff?text=Bowser' }
            ]},
            { rarity: 'SSR', prob: 0.05, points: 10, chars: [
                { name: '無敵星星', img: 'https://via.placeholder.com/80/f39c12/ffffff?text=Star' },
                { name: '皇冠', img: 'https://via.placeholder.com/80/f1c40f/ffffff?text=Crown' },
                { name: '火之花', img: 'https://via.placeholder.com/80/e67e22/ffffff?text=Flower' },
                { name: '1-UP 蘑菇', img: 'https://via.placeholder.com/80/2ecc71/ffffff?text=1-UP' }
            ]}
        ];

        let watchData = {};
        let isCardFlipped = false;

        // 連動選單邏輯
        function updateUnits() {
            const levelSelect = document.getElementById("level").value;
            const unitSelect = document.getElementById("unit");
            const lessonSelect = document.getElementById("lesson");
            
            unitSelect.innerHTML = '<option value="" disabled selected>請選擇 Unit...</option>';
            lessonSelect.innerHTML = '<option value="" disabled selected>先選擇 Unit</option>';
            lessonSelect.disabled = true;

            if (levelSelect && courseData[levelSelect]) {
                for (let unit in courseData[levelSelect]) {
                    unitSelect.innerHTML += `<option value="${unit}">${unit}</option>`;
                }
                unitSelect.disabled = false;
            }
        }

        function updateLessons() {
            const levelSelect = document.getElementById("level").value;
            const unitSelect = document.getElementById("unit").value;
            const lessonSelect = document.getElementById("lesson");
            
            lessonSelect.innerHTML = '<option value="" disabled selected>請選擇 Lesson...</option>';

            if (unitSelect && courseData[levelSelect][unitSelect]) {
                courseData[levelSelect][unitSelect].forEach(lesson => {
                    lessonSelect.innerHTML += `<option value="${lesson}">${lesson}</option>`;
                });
                lessonSelect.disabled = false;
            }
        }

        // 啟動抽卡機制
        function startGacha() {
            const viewer = document.getElementById("viewer").value;
            const level = document.getElementById("level").value;
            const unit = document.getElementById("unit").value;
            const lesson = document.getElementById("lesson").value;

            if (!viewer || !level || !unit || !lesson) {
                alert("請將觀看者與課程單元都選擇完畢喔！");
                return;
            }

            watchData = { viewer, level, unit, lesson };
            
            document.getElementById("form-section").style.display = "none";
            document.getElementById("gacha-section").style.display = "block";
        }

        // 抽卡邏輯演算
        function drawLogic() {
            let rand = Math.random();
            let cumulative = 0;
            let selectedTier = null;

            for (let tier of gachaPool) {
                cumulative += tier.prob;
                if (rand <= cumulative) {
                    selectedTier = tier;
                    break;
                }
            }

            const charIndex = Math.floor(Math.random() * selectedTier.chars.length);
            const character = selectedTier.chars[charIndex];

            return {
                rarity: selectedTier.rarity,
                points: selectedTier.points,
                name: character.name,
                img: character.img
            };
        }

        // 翻牌與寫入後台
        function flipCard(cardElement) {
            if (isCardFlipped) return; // 只能抽一張
            isCardFlipped = true;

            const result = drawLogic();
            
            // 設定正面內容
            const front = cardElement.querySelector('.card-front');
            front.innerHTML = `
                <div class="char-image" style="background-image: url('${result.img}')"></div>
                <div class="char-name">${result.name}</div>
                <div class="char-points">${result.rarity} (${result.points}分)</div>
            `;

            // 觸發翻牌動畫
            cardElement.classList.add("flipped");

            // 顯示結果文字
            const msgBox = document.getElementById("result-msg");
            msgBox.innerHTML = `恭喜 ${watchData.viewer} 抽中 <strong>${result.name}</strong>！獲得 ${result.points} 分！<br><span style="font-size:0.9rem; color:#7f8c8d;">(紀錄傳送中...)</span>`;
            msgBox.style.display = "block";

            // 準備傳送資料至 Google Sheets
            const finalData = {
                viewer: watchData.viewer,
                level: watchData.level,
                unit: watchData.unit,
                lesson: watchData.lesson,
                character: result.name,
                points: result.points
            };

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors', // 避免跨網域阻擋
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(finalData)
            }).then(() => {
                msgBox.innerHTML = `恭喜 ${watchData.viewer} 抽中 <strong>${result.name}</strong>！獲得 ${result.points} 分！<br><span style="font-size:0.9rem; color:#27ae60;">(紀錄已成功儲存至後台！)</span>`;
                document.getElementById("reset-btn").style.display = "inline-block";
            }).catch(error => {
                console.error('Error:', error);
                msgBox.innerHTML += `<br><span style="color:red;">紀錄傳送失敗，請稍後再試。</span>`;
            });
        }
    </script>
</body>
</html>
